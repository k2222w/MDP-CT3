<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Home</title>
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;background:#fff;color:#111;}
    .wrap{width:100vw;min-height:100svh;padding:24px 20px 20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
    h1{margin:0 0 14px 0;font-size:22px;font-weight:650;}
    .info{font-size:12px;color:#666;margin-bottom:14px;}
    .card{border:1px solid #e7e7e7;border-radius:16px;padding:14px;background:#fafafa;}
    .row{display:flex;gap:12px;padding:10px 0;border-bottom:1px dashed #e3e3e3;}
    .row:last-child{border-bottom:none;}
    .k{width:110px;font-size:12px;color:#666;}
    .v{flex:1;font-size:13px;word-break:break-word;}
    .btn{margin-top:16px;width:100%;padding:16px 0;border:none;border-radius:16px;background:#111;color:#fff;font-size:17px;font-weight:600;cursor:pointer;}
    .btn:active{opacity:.86;}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Home Page</h1>
    <div class="info">This is a simple prototype page. It reads the owner data from localStorage.</div>

    <div class="card">
      <div class="row"><div class="k">t (tag_id)</div><div class="v" id="tag_id">NULL</div></div>
      <div class="row"><div class="k">owner_name</div><div class="v" id="owner_name">NULL</div></div>
      <div class="row"><div class="k">claimed_at</div><div class="v" id="claimed_at">NULL</div></div>
      <div class="row"><div class="k">claimed_mode</div><div class="v" id="claimed_mode">NULL</div></div>
      <div class="row"><div class="k">storage_key</div><div class="v" id="storage_key">NULL</div></div>
    </div>

    <button class="btn" id="back_btn">Back to Entry</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const tagId = params.get('t') || 'UNDEFINED';
    const key = `tag:${tagId}`;

    document.getElementById('tag_id').innerText = tagId;
    document.getElementById('storage_key').innerText = key;

    let data = null;
    try {
      const raw = localStorage.getItem(key);
      data = raw ? JSON.parse(raw) : null;
    } catch(e) {}

    document.getElementById('owner_name').innerText = data?.owner_name ?? 'NULL';
    document.getElementById('claimed_at').innerText = data?.claimed_at ?? 'NULL';
    document.getElementById('claimed_mode').innerText = data?.claimed_mode ?? 'NULL';

    document.getElementById('back_btn').addEventListener('click', () => {
      window.location.href = `/entry?t=${encodeURIComponent(tagId)}`;
    });
  </script>
</body>
</html>
