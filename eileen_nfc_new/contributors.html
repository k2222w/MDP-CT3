<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Growing Textiles — Contributors</title>
    <link rel="stylesheet" href="contributors.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="burger-btn" id="burgerBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <header class="main-header">
        <nav class="desktop-nav">
            <a href="index.html">The Archive</a>
            <a href="#" class="active">Contributors</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <section class="hero-title">
        <span class="blue">The</span><span class="orange">Knotting</span><span class="green">Lounge</span>
    </section>

    <div class="sub-title">Piece #ArtCenter</div>

    <main class="list-container">
        <div id="rows" class="rows"></div>
    </main>

    <div class="bottom-action">
        <button id="back_btn" class="btn-floating">Go to the Archive</button>
    </div>

    <div class="debug" id="debug"></div>

    <div class="mobile-menu-overlay" id="fullMenu">
        <div class="close-menu-btn" id="closeMenuBtn">✕</div>
        <div class="mobile-menu-content">
            <a href="index.html">The Archive</a>
            <a href="#" class="active">Contributors</a>
            <a href="about.html">About</a>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 页面交互逻辑 (汉堡菜单)
        // ==========================================
        const burgerBtn = document.getElementById('burgerBtn');
        const fullMenu = document.getElementById('fullMenu');
        const closeMenuBtn = document.getElementById('closeMenuBtn');

        burgerBtn.addEventListener('click', () => {
            fullMenu.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });

        closeMenuBtn.addEventListener('click', () => {
            fullMenu.style.display = 'none';
            document.body.style.overflow = '';
        });

        const menuLinks = document.querySelectorAll('.mobile-menu-content a');
        menuLinks.forEach(link => {
            link.addEventListener('click', () => {
                fullMenu.style.display = 'none';
                document.body.style.overflow = '';
            });
        });

        // ==========================================
        // 2. 数据库读取逻辑 (核心配置完全保留)
        // ==========================================
        const SUPABASE_URL = "https://jtccayxyxuopkwdrrbmg.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0Y2NheXh5eHVvcGt3ZHJyYm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk2Mjg0MTEsImV4cCI6MjA4NTIwNDQxMX0.NgFTzgE142pcZckgsXRLzu658UIoSaBrtGJy0-mezVM";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const rowsEl = document.getElementById('rows');
        const debugEl = document.getElementById('debug');
        const backBtn = document.getElementById('back_btn');

        function setDebug(msg){ debugEl.textContent = msg || ''; }

        function formatDate(iso) {
            const d = new Date(iso);
            const now = new Date();
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60) return 'Just now';
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            return `${months[d.getMonth()]} ${d.getDate()}`;
        }

        // 修改了 HTML 结构以匹配新设计
        function rowTemplate(name, dateText){
            return `
                <div class="row">
                    <div class="name">${escapeHtml(name)}</div>
                    <div class="date">${escapeHtml(dateText)}</div>
                </div>
            `;
        }

        function escapeHtml(str){
            return String(str)
                .replaceAll('&','&amp;')
                .replaceAll('<','&lt;')
                .replaceAll('>','&gt;')
                .replaceAll('"','&quot;')
                .replaceAll("'","&#039;");
        }

        async function loadList(){
            setDebug('');
            rowsEl.innerHTML = '';

            const { data, error } = await supabaseClient
                .from('contributions')
                .select('id, name, created_at')
                .order('created_at', { ascending: false })
                .limit(200);

            if (error) {
                console.error(error);
                setDebug(`Error: ${error.message || error}`);
                return;
            }

            if (!data || data.length === 0) {
                rowsEl.innerHTML = `<div class="empty">No records yet.</div>`;
                return;
            }

            // 渲染数据
            rowsEl.innerHTML = data.map(r => rowTemplate(r.name, formatDate(r.created_at))).join('');
        }

        backBtn.addEventListener('click', () => {
            window.location.href = "index.html";
        });

        loadList();
    </script>
</body>
</html>
